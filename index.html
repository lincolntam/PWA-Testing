<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PWA Testing" />

  <title>PWA Testing</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./route.css?v=1" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json?v=1" />

  <!-- Optional: iOS icons (如你 repo 有放 icon 檔就改路徑/檔名) -->
  <!-- <link rel="apple-touch-icon" href="./assets/icons/icon-192.png圖層：你 route.js/Google Map/Leaflet 都可以掛喺呢個 div -->
  <div id="map" role="application" aria-label="Map"></div>

  <!-- 版本號：固定最底，不影響地圖高度 -->
  <div id="version">v1</div>

  <script>
    /**
     * ✅ 背景圖設定：
     * 1) 請把背景圖 upload 到 repo，例如：/assets/bg/bg1.jpg
     * 2) 下面保持不變就會生效
     *
     * 重要：GitHub Pages 無法讀本機 C:\ 路徑，必須用 repo 相對路徑。 
     */
    const BG_URL = "./assets/bg/bg1.jpg"; // ← 改呢行去你實際背景圖路徑/檔名

    const bg = document.getElementById("bg");
    bg.style.backgroundImage = `url('${BG_URL}')`;

    // ✅ 註冊 Service Worker（你 repo 有 sw.js）
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>

  <!-- 你 repo 有 route.js：保留載入（如你用佢初始化 map） -->
  <script src="./route.js?v=1" defer></script>
</body>
</html>
