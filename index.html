<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />

  <!-- ✅ iOS 全屏關鍵 -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" /> <!-- [2](https://github.com/lahcen001/Ramz/blob/main/PWA_GUIDE.md)[3](https://github.com/alkhaledsumer/test/blob/main/index.html) -->

  <meta name="theme-color" content="#000000" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />

  <!-- iOS PWA（可選但建議） -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <title>My PWA</title>
</head>

<body>
  <!-- ✅ 全屏背景層 -->
  <div id="bg"></div>

  <!-- ✅ 內容層 -->
  <main id="app">
    <h1>全螢幕 PWA</h1>
    <p>背景會鋪滿整個螢幕（含 iOS 底部手勢區）。</p>
  </main>

  <!-- ✅ 版本號（最底） -->
  <div id="version">v1</div>

  <script>
    // ✅ 註冊 SW（你 repo 有 sw.js）
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
